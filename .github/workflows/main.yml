name: Security Scan
on: [push, pull_request]
jobs:
  security-scan:
    runs-on: [self-hosted, local-armis]
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Armis CLI
        run: |
          /Users/sheadrick/Documents/Projects/armis-cli-main/bin/armis-cli
      - name: Scan Repository
        env:
          ARMIS_CLIENT_ID: ${{ secrets.ARMIS_CLIENT_ID }}
          ARMIS_CLIENT_SECRET: ${{ secrets.ARMIS_CLIENT_SECRET }}
        run: |
           /Users/sheadrick/Documents/Projects/armis-cli-main/bin/armis-cli scan repo . \
            --format sarif \
            > results.sarif
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: results.sarif
